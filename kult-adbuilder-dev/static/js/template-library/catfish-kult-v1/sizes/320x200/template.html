<div id="mainContainer">
  <div id="small_close_btn" class="text">X</div>
  <div class="clickTag"></div>
  <div id="bannerBox"></div>
  <div class="video-holder">            
    <ft-video id="video1"name="video1" autoplay  muted></ft-video>
    <div id="control-holder" class="control-holder">
      <div id="play-control" class="btn-holder">
        <img class="play control" src="play.png" />
        <img class="pause control" src="pause.png" />
      </div>
      <div id="volume" class="btn-holder">
        <img class="mute control" src="mute.png" />
        <img class="unmute control" src="unmute.png" />
      </div>
    </div>             
  </div>
  <div class="end-frame">
    <img src="replay.png"/>
    <span>Replay Video</span>
  </div>
</div>
