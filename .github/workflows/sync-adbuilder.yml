name: Sync Adbuilder from Dev

on:
  push:
    paths:
      - '.github/workflows/sync-adbuilder.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-adbuilder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Copy kult-adbuilder-dev to kult-adbuilder
        run: |
          set -euo pipefail
          rm -rf kult-adbuilder
          mkdir -p kult-adbuilder
          cp -a kult-adbuilder-dev/. kult-adbuilder/
          if [ -f kult-adbuilder/README.md ]; then
            sed -i 's/kult-adbuilder-dev/kult-adbuilder/g' kult-adbuilder/README.md
            sed -i 's/Development version of the ad builder/Production version of the ad builder/g' kult-adbuilder/README.md
          fi
          rm -f .github/workflows/sync-adbuilder.yml

      - name: Commit synced files
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add kult-adbuilder .github/workflows/sync-adbuilder.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync kult-adbuilder from dev"
            git push
          fi
